kind = "web"
previewPath = "/"
title = "Johnson Honda Reward Dashboard"
version = "1.0.0"
id = "artifacts/reward-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26250

[services.development]
run = "pnpm --filter @workspace/reward-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reward-dashboard", "run", "build" ]
publicDir = "artifacts/reward-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26250"
BASE_PATH = "/"
